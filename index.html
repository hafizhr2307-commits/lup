<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I LOVE YOU</title>

  <!-- ===== GABUNGAN CSS ===== -->
  <style>
    /* === dari style.css === */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Rubik:wght@300;400;500;600;700;800&display=swap');

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: clamp(1.5rem, 2rem, 3rem);
        font-weight: 700;
        font-family: 'Poppins', sans-serif;
        margin: 0;
        color: rgb(255, 255, 255);
    }

    .container {
        text-align: center; 
    }

    .container > span{
        animation: glow 0s ease-in-out infinite;
    }

    @keyframes glow {
        0%, 100%{
            color: rgb(255, 255, 255);
            text-shadow: 0 0 22px rgb(43, 248, 255), 0 0 70px rgb(0, 255, 255);
        }
        10%, 90%{
            color: rgb(27, 27, 27);
            text-shadow: none;
        }
    }

    .video-background {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    #video-bg {
        position: absolute;
        top: 0;
        left: 0;
        min-width: 100%;
        min-height: 100%;
        z-index: -1;
    }

    /* === dari card.css === */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&family=Rubik:wght@300;400;500;600;700;800&display=swap');

    body {
        margin: 0;
        overflow: hidden;
    }

    video {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        z-index: -1;
    }

    content {
        z-index: 1;
    }

    .paper {
        background-color: rgb(234, 229, 229);
        top: 30%;
        left: 40%;
        padding: 20px 80px;
        transform: rotateZ(-5deg);
        box-shadow: 1px 15px 20px 0px rgba(0,0,0,0.5);
        position: absolute;
        border-radius: 20px;
        text-align: center;
        cursor: grab;
        touch-action: none;
    }

    .paper:active {
        cursor: grabbing;
    }

    .content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        text-align: center;
        color: #fff;
    }

    .paper.image {
        padding: 10px;
    }

    .paper.image p {
        font-size: 20px;
    }

    img {
        max-height: 200px;
        width: 100%;
        user-select: none;
        pointer-events: none;
    }

    @keyframes glowText {
        0%, 100% {
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #fff, 0 0 40px #ff00e0, 0 0 70px #ff00e0, 0 0 80px #ff00e0, 0 0 100px #ff00e0, 0 0 150px #ff00e0;
        }
        50% {
            text-shadow: 0 0 20px #fff, 0 0 30px #fff, 0 0 40px #ff00e0, 0 0 70px #ff00e0, 0 0 80px #ff00e0, 0 0 100px #ff00e0, 0 0 150px #ff00e0, 0 0 180px #ff00e0;
        }
    }

    #lyrics {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #fff;
        z-index: 10;
        pointer-events: none;
    }

    #lyrics span {
        animation: glowText 2s ease-in-out;
        font-size: 30px;
    }

    p {
        font-family: 'Poppins', sans-serif;
        font-size: 40px;
        color: rgb(0, 0, 0);
        user-select: none;
        margin: 5px 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .paper {
            padding: 15px 40px;
            top: 25%;
            left: 20%;
        }
        img {
            max-height: 130px;
        }
        p {
            font-size: 24px;
        }
        #lyrics span {
            font-size: 20px;
        }
    }

    @media (max-width: 480px) {
        .paper {
            padding: 10px 20px;
            top: 20%;
            left: 10%;
        }
        img {
            max-height: 100px;
        }
        p {
            font-size: 18px;
        }
        #lyrics span {
            font-size: 16px;
        }
    }
  </style>
</head>
<body>

  <!-- ===== VIDEO BACKGROUND ===== -->
  <video autoplay loop muted playsinline id="video-bg">

  <!-- ===== GABUNGAN JAVASCRIPT ===== -->
  <script>
    // ============================================================
    // 1. CARD.JS - Drag & Rotate Paper
    // ============================================================
    (function() {
        let highestZ = 1;

        class Paper {
            holdingPaper = false;
            mouseTouchX = 0;
            mouseTouchY = 0;
            mouseX = 0;
            mouseY = 0;
            prevMouseX = 0;
            prevMouseY = 0;
            velX = 0;
            velY = 0;
            rotation = Math.random() * 30 - 15;
            currentPaperX = 0;
            currentPaperY = 0;
            rotating = false;

            init(paper) {
                // Mouse move
                document.addEventListener('mousemove', (e) => {
                    if (!this.rotating) {
                        this.mouseX = e.clientX;
                        this.mouseY = e.clientY;
                        this.velX = this.mouseX - this.prevMouseX;
                        this.velY = this.mouseY - this.prevMouseY;
                    }

                    const dirX = e.clientX - this.mouseTouchX;
                    const dirY = e.clientY - this.mouseTouchY;
                    const dirLength = Math.sqrt(dirX * dirX + dirY * dirY);
                    if (dirLength > 0) {
                        const dirNormalizedX = dirX / dirLength;
                        const dirNormalizedY = dirY / dirLength;
                        const angle = Math.atan2(dirNormalizedY, dirNormalizedX);
                        let degrees = 180 * angle / Math.PI;
                        degrees = (360 + Math.round(degrees)) % 360;
                        if (this.rotating) {
                            this.rotation = degrees;
                        }
                    }

                    if (this.holdingPaper) {
                        if (!this.rotating) {
                            this.currentPaperX += this.velX;
                            this.currentPaperY += this.velY;
                        }
                        this.prevMouseX = this.mouseX;
                        this.prevMouseY = this.mouseY;
                        paper.style.transform = `translateX(${this.currentPaperX}px) translateY(${this.currentPaperY}px) rotateZ(${this.rotation}deg)`;
                    }
                });

                // Mouse down
                paper.addEventListener('mousedown', (e) => {
                    if (this.holdingPaper) return;
                    this.holdingPaper = true;
                    paper.style.zIndex = highestZ;
                    highestZ += 1;

                    if (e.button === 0) {
                        this.mouseTouchX = this.mouseX;
                        this.mouseTouchY = this.mouseY;
                        this.prevMouseX = this.mouseX;
                        this.prevMouseY = this.mouseY;
                    }
                    if (e.button === 2) {
                        this.rotating = true;
                    }
                });

                // Mouse up
                window.addEventListener('mouseup', () => {
                    this.holdingPaper = false;
                    this.rotating = false;
                });

                // Touch events for mobile
                paper.addEventListener('touchstart', (e) => {
                    if (this.holdingPaper) return;
                    this.holdingPaper = true;
                    paper.style.zIndex = highestZ;
                    highestZ += 1;

                    const touch = e.touches[0];
                    this.mouseTouchX = touch.clientX;
                    this.mouseTouchY = touch.clientY;
                    this.prevMouseX = touch.clientX;
                    this.prevMouseY = touch.clientY;
                    this.mouseX = touch.clientX;
                    this.mouseY = touch.clientY;
                }, { passive: true });

                document.addEventListener('touchmove', (e) => {
                    if (!this.holdingPaper) return;
                    const touch = e.touches[0];
                    this.mouseX = touch.clientX;
                    this.mouseY = touch.clientY;
                    this.velX = this.mouseX - this.prevMouseX;
                    this.velY = this.mouseY - this.prevMouseY;

                    this.currentPaperX += this.velX;
                    this.currentPaperY += this.velY;
                    this.prevMouseX = this.mouseX;
                    this.prevMouseY = this.mouseY;

                    paper.style.transform = `translateX(${this.currentPaperX}px) translateY(${this.currentPaperY}px) rotateZ(${this.rotation}deg)`;
                }, { passive: true });

                document.addEventListener('touchend', () => {
                    this.holdingPaper = false;
                    this.rotating = false;
                }, { passive: true });
            }
        }

        const papers = Array.from(document.querySelectorAll('.paper'));
        papers.forEach(paper => {
            const p = new Paper();
            p.init(paper);
        });
    })();

    // ============================================================
    // 2. SCRIPT.JS + CARD.JS - Lyrics Animation
    // ============================================================
    document.addEventListener("DOMContentLoaded", function () {
        const lyrics = [
            " ",
            " ",
            " ",
            " ",
            " ",
            "KARENA AKU ",
            "MENCINTAIMU ",
            "DAN HATIKU",
            "HANYA UNTUKMU",
            "TAK AKAN MENYERAH",
            "DAN TAKAN BERHENTI",
            "MENCINTAIMU",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " ",
            " "
        ];

        const delay = 41;
        const lyricsElement = document.getElementById("lyrics");

        async function displayLyrics() {
            for (const line of lyrics) {
                for (const char of line) {
                    const charElement = document.createElement("span");
                    charElement.textContent = char;
                    charElement.style.animation = "glowText 2s ease-in-out";
                    charElement.style.fontSize = "30px";
                    lyricsElement.appendChild(charElement);

                    await new Promise((resolve) => setTimeout(resolve, delay));

                    charElement.style.animation = "";
                }

                lyricsElement.appendChild(document.createElement("br"));

                await new Promise((resolve) => setTimeout(resolve, delay * 25));

                lyricsElement.textContent = "";

                await new Promise((resolve) => setTimeout(resolve, delay * 35));
            }

            // Optional: redirect after finish
            // setTimeout(function () {
            //     window.location.href = "yournexthtmlfile.html";
            // }, 700);
        }

        displayLyrics();
    });
  </script>
</body>
